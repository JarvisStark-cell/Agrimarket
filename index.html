<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriMarket Pro - Sàn Nông Sản Số</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .card-custom { @apply bg-white rounded-[2rem] shadow-sm border border-slate-100 p-6; }
        .btn-primary { @apply bg-[#0f172a] text-white px-6 py-3 rounded-2xl font-semibold hover:bg-black transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen">

    <!-- OVERLAY LOADING -->
    <div id="loadingOverlay" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-[100] flex flex-col items-center justify-center hidden">
        <div class="w-12 h-12 border-4 border-emerald-200 border-t-emerald-600 rounded-full animate-spin mb-4"></div>
        <p class="text-slate-600 font-bold animate-pulse">Đang xử lý...</p>
    </div>

    <!-- LOGIN / REGISTER VIEW -->
    <div id="loginView" class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-[450px] w-full bg-white rounded-[2.5rem] shadow-sm p-8 md:p-12 border border-gray-50">
            <div class="flex flex-col items-center mb-8">
                <div class="w-16 h-16 bg-gradient-to-br from-[#10b981] to-emerald-700 rounded-2xl flex items-center justify-center shadow-lg shadow-emerald-100 mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                    </svg>
                </div>
                <h1 class="text-3xl font-bold text-[#1e293b] mb-1">AgriMarket</h1>
                <p class="text-slate-500 font-medium text-sm">Nền tảng giao dịch nông sản</p>
            </div>

            <div class="space-y-5">
                <div id="roleSelectDiv">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Bạn là ai?</label>
                    <select id="role" class="w-full px-4 py-3 rounded-2xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-slate-50 font-medium">
                        <option value="buyer">Khách mua hàng</option>
                        <option value="seller">Chủ trang trại / Người bán</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Email</label>
                    <input type="email" id="email" placeholder="Nhập email của bạn" class="w-full px-4 py-3 rounded-2xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-slate-50">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Mật khẩu</label>
                    <input type="password" id="password" placeholder="••••••" class="w-full px-4 py-3 rounded-2xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-slate-50">
                </div>

                <div class="flex items-center pt-1">
                    <label class="relative flex items-center cursor-pointer">
                        <input type="checkbox" id="rememberMe" class="sr-only peer">
                        <div class="w-5 h-5 bg-slate-50 border border-slate-300 rounded-md peer-checked:bg-emerald-500 peer-checked:border-emerald-500 transition-all flex items-center justify-center">
                            <svg class="w-3.5 h-3.5 text-white opacity-0 peer-checked:opacity-100" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                        <span class="ml-2 text-sm text-slate-600 font-medium">Ghi nhớ thông tin đăng nhập</span>
                    </label>
                </div>

                <div class="flex gap-3 pt-2">
                    <button onclick="handleAuth('login')" class="flex-1 py-3.5 bg-[#0f172a] text-white font-bold rounded-2xl hover:bg-black transition-all active:scale-95">Đăng nhập</button>
                    <button onclick="handleAuth('register')" class="flex-1 py-3.5 bg-white border-2 border-emerald-500 text-emerald-600 font-bold rounded-2xl hover:bg-emerald-50 transition-all active:scale-95">Đăng ký mới</button>
                </div>
            </div>

            <div class="mt-8 pt-6 border-t border-slate-100">
                <p class="text-xs text-center text-slate-400 mb-3">Tài khoản trải nghiệm nhanh</p>
                <div class="flex gap-2">
                    <button onclick="fillForm('seller', 'seller@agri.com', '123456')" class="flex-1 text-xs bg-orange-50 text-orange-600 py-2 rounded-xl font-bold hover:bg-orange-100">Bản Seller</button>
                    <button onclick="fillForm('buyer', 'buyer@agri.com', '123456')" class="flex-1 text-xs bg-blue-50 text-blue-600 py-2 rounded-xl font-bold hover:bg-blue-100">Bản Buyer</button>
                </div>
            </div>
        </div>
    </div>

    <!-- BUYER VIEW -->
    <div id="buyerView" class="hidden min-h-screen bg-[#f8fafc]">
        <header class="bg-white border-b border-slate-100 sticky top-0 z-40">
            <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between gap-4">
                <div class="flex items-center gap-2 cursor-pointer" onclick="navigateTo('home')">
                    <div class="bg-emerald-500 p-2 rounded-xl text-white">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" stroke-width="2" /></svg>
                    </div>
                    <span class="font-bold text-xl text-slate-800 hidden md:block">AgriMarket</span>
                </div>
                
                <div class="flex-grow max-w-xl">
                    <div class="relative">
                        <input type="text" id="buyerSearchInput" oninput="handleSearch(this.value)" placeholder="Tìm rau củ, trái cây..." class="w-full pl-12 pr-4 py-2.5 bg-slate-50 border-2 border-transparent focus:border-emerald-500 rounded-full text-sm outline-none transition-all">
                        <svg class="w-5 h-5 text-slate-400 absolute left-4 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2" /></svg>
                    </div>
                </div>

                <div class="flex items-center gap-2 md:gap-3">
                    <button onclick="navigateTo('cart')" class="relative p-2.5 bg-slate-50 rounded-2xl hover:bg-slate-100 transition-all group">
                        <svg class="w-6 h-6 text-slate-600 group-hover:text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" stroke-width="2" /></svg>
                        <span id="cartCount" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full shadow-sm hidden">0</span>
                    </button>
                    <button onclick="navigateTo('orders')" class="p-2.5 bg-slate-50 rounded-2xl hover:bg-slate-100 transition-all">
                        <svg class="w-6 h-6 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" stroke-width="2" /></svg>
                    </button>
                    <button onclick="logout()" class="p-2.5 bg-slate-900 text-white rounded-2xl hover:bg-red-600 transition-all flex items-center justify-center relative group">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" stroke-width="2" /></svg>
                        <div class="absolute top-12 right-0 bg-slate-800 text-white text-xs px-2 py-1 rounded hidden group-hover:block whitespace-nowrap">Đăng xuất</div>
                    </button>
                </div>
            </div>
        </header>

        <main id="buyerContent" class="max-w-7xl mx-auto px-4 py-8">
            <!-- Render Content Here -->
        </main>
    </div>

    <!-- SELLER PORTAL VIEW -->
    <div id="sellerView" class="hidden min-h-screen bg-[#f8fafc] pb-20">
        <header class="bg-white border-b border-slate-100 sticky top-0 z-30">
            <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
                <div>
                    <p class="text-[10px] font-bold text-emerald-600 uppercase tracking-wider">Khu vực quản lý</p>
                    <h2 class="text-xl font-bold text-slate-800">Xin chào, <span id="sellerNameDisplay">Chủ vườn</span></h2>
                </div>
                <button onclick="logout()" class="flex items-center gap-2 bg-slate-100 text-slate-700 px-4 py-2 rounded-xl font-bold hover:bg-red-50 hover:text-red-600 transition-all text-sm">
                    Đăng xuất
                </button>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 py-8 space-y-8">
            <section class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="card-custom !p-5 bg-gradient-to-br from-blue-500 to-blue-600 text-white border-none shadow-md">
                    <p class="text-blue-100 text-sm font-medium mb-1">Sản phẩm</p>
                    <p id="statProducts" class="text-4xl font-bold">0</p>
                </div>
                <div class="card-custom !p-5 bg-gradient-to-br from-orange-400 to-orange-500 text-white border-none shadow-md">
                    <p class="text-orange-100 text-sm font-medium mb-1">Đơn chờ duyệt</p>
                    <p id="statNewOrders" class="text-4xl font-bold">0</p>
                </div>
                <div class="card-custom !p-5 bg-white shadow-sm border border-slate-100">
                    <p class="text-slate-500 text-sm font-medium mb-1">Đang giao</p>
                    <p id="statProcessing" class="text-4xl font-bold text-slate-800">0</p>
                </div>
                <div class="card-custom !p-5 bg-white shadow-sm border border-slate-100">
                    <p class="text-slate-500 text-sm font-medium mb-1">Doanh thu (VNĐ)</p>
                    <p id="statRevenue" class="text-2xl font-bold text-emerald-600 truncate">0</p>
                </div>
            </section>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- FORM THÊM / SỬA SẢN PHẨM -->
                <div class="card-custom lg:col-span-1 h-fit sticky top-24 shadow-md border-emerald-100 border">
                    <div class="flex justify-between items-center mb-6 border-b border-slate-100 pb-3">
                        <h4 id="formTitle" class="text-lg font-bold text-slate-800 flex items-center gap-2"><span class="w-1.5 h-6 bg-emerald-500 rounded-full"></span> Thêm sản phẩm mới</h4>
                        <button id="btnCancelEdit" onclick="cancelEdit()" class="hidden text-xs bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg font-bold hover:bg-slate-200 transition-colors">Hủy sửa</button>
                    </div>
                    <div class="space-y-4">
                        <input type="hidden" id="pIdHidden">
                        <div>
                            <label class="text-[11px] font-bold text-slate-500 mb-1.5 block uppercase tracking-wide">Tên sản phẩm *</label>
                            <input id="pName" placeholder="VD: Cà chua bi hữu cơ" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 text-sm focus:ring-2 focus:ring-emerald-500 focus:bg-white outline-none transition-all">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-[11px] font-bold text-slate-500 mb-1.5 block uppercase tracking-wide">Phân loại *</label>
                                <select id="pType" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 text-sm focus:ring-2 focus:ring-emerald-500 focus:bg-white outline-none transition-all">
                                    <option value="Rau xanh">Rau xanh</option>
                                    <option value="Củ quả">Củ quả</option>
                                    <option value="Trái cây">Trái cây</option>
                                    <option value="Thịt/Trứng">Thịt/Trứng</option>
                                    <option value="Khác">Khác</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[11px] font-bold text-slate-500 mb-1.5 block uppercase tracking-wide">Nguồn gốc</label>
                                <input id="pOriginInput" placeholder="VD: Đà Lạt" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 text-sm focus:ring-2 focus:ring-emerald-500 focus:bg-white outline-none transition-all">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-[11px] font-bold text-slate-500 mb-1.5 block uppercase tracking-wide">Giá bán (VNĐ) *</label>
                                <input id="pPrice" type="number" min="0" placeholder="0" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 text-sm focus:ring-2 focus:ring-emerald-500 focus:bg-white outline-none transition-all">
                            </div>
                            <div>
                                <label class="text-[11px] font-bold text-slate-500 mb-1.5 block uppercase tracking-wide">Số lượng Kho *</label>
                                <input id="pStock" type="number" min="0" placeholder="0" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 text-sm focus:ring-2 focus:ring-emerald-500 focus:bg-white outline-none transition-all">
                            </div>
                        </div>
                        <div>
                            <!-- Input URL ảnh -->
                            <label class="text-[11px] font-bold text-slate-500 mb-1.5 block uppercase tracking-wide">Link Ảnh Sản phẩm (URL)</label>
                            <input id="pImageURL" type="text" placeholder="https://domain.com/anh.jpg" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 text-sm focus:ring-2 focus:ring-emerald-500 focus:bg-white outline-none transition-all">
                            <p class="text-[10px] text-slate-400 mt-1">Sử dụng link ảnh có sẵn trên internet.</p>
                        </div>
                        <div>
                            <label class="text-[11px] font-bold text-slate-500 mb-1.5 block uppercase tracking-wide">Mô tả chi tiết</label>
                            <textarea id="pDesc" placeholder="Thông tin về chất lượng, cách trồng..." class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-sm h-24 focus:ring-2 focus:ring-emerald-500 focus:bg-white outline-none transition-all"></textarea>
                        </div>
                        <button id="btnSaveProduct" onclick="saveProduct()" class="w-full btn-primary !bg-[#10b981] hover:!bg-emerald-600 py-3.5 shadow-lg shadow-emerald-200/50 mt-2">Thêm sản phẩm</button>
                    </div>
                </div>

                <div class="lg:col-span-2 space-y-8">
                    <div>
                        <h3 class="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2"><span class="w-2 h-6 bg-slate-300 rounded-full"></span> Quản lý sản phẩm</h3>
                        <div class="space-y-3 max-h-[500px] overflow-y-auto pr-2 no-scrollbar" id="productList"></div>
                    </div>
                    
                    <div>
                        <h3 class="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2"><span class="w-2 h-6 bg-orange-500 rounded-full"></span> Đơn hàng cần xử lý</h3>
                        <div id="orderList" class="space-y-3"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Message Toast -->
    <div id="toast" class="fixed bottom-10 right-10 bg-white shadow-2xl rounded-2xl p-4 border-l-4 border-emerald-500 transform translate-y-40 transition-all opacity-0 z-50 pointer-events-none flex items-center gap-3">
        <svg class="w-6 h-6 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <p id="toastText" class="font-bold text-slate-800 text-sm"></p>
    </div>

    <!-- MAIN LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, deleteDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 1. Cấu hình Firebase
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyAnkZLh9kDISvMWovWSj7fyTfijAPZCTwE",
            authDomain: "agrimarket-fb5d6.firebaseapp.com",
            projectId: "agrimarket-fb5d6",
            storageBucket: "agrimarket-fb5d6.firebasestorage.app",
            messagingSenderId: "16797344559",
            appId: "1:16797344559:web:d791b32546fc3c24dfb7da"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'agrimarket-pro';

        // 2. Global State
        let products = [];
        let cart = [];
        let orders = [];
        let fbUser = null;
        let userProfile = null; // { email, role }
        
        let currentSearchQuery = "";
        let activeCategory = "Tất cả";
        let displayLimit = 8;
        let currentBuyerPage = 'home';
        
        let dbRefs = {};
        let unsubCart = null;

        // Khôi phục thông tin đăng nhập từ LocalStorage khi khởi động
        window.addEventListener('DOMContentLoaded', () => {
            const savedCreds = localStorage.getItem('agri_remember');
            if (savedCreds) {
                try {
                    const data = JSON.parse(savedCreds);
                    document.getElementById('email').value = data.email || '';
                    document.getElementById('password').value = data.password || '';
                    document.getElementById('role').value = data.role || 'buyer';
                    document.getElementById('rememberMe').checked = true;
                } catch(e) {
                    console.error("Lỗi đọc LocalStorage", e);
                }
            }
        });

        // 3. Khởi tạo Auth AN TOÀN
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) { 
                console.error("Lỗi đăng nhập:", error);
            }
        };
        initAuth();

        onAuthStateChanged(auth, async (user) => {
            fbUser = user;
            if (user) {
                // Thiết lập Paths
                dbRefs.products = collection(db, 'artifacts', appId, 'public', 'data', 'products');
                dbRefs.orders = collection(db, 'artifacts', appId, 'public', 'data', 'orders');
                dbRefs.profiles = collection(db, 'artifacts', appId, 'public', 'data', 'profiles');
                dbRefs.cart = collection(db, 'artifacts', appId, 'users', user.uid, 'cart');

                // Kiểm tra xem user này đã "đăng nhập" vào app thông qua profile chưa
                const docSnap = await getDoc(doc(dbRefs.profiles, user.uid));
                if (docSnap.exists()) {
                    userProfile = docSnap.data();
                    routeUser();
                }

                // Luôn lắng nghe Real-time Products & Orders
                onSnapshot(dbRefs.products, (snap) => {
                    products = snap.docs.map(d => d.data());
                    refreshUI();
                }, e => console.error(e));

                onSnapshot(dbRefs.orders, (snap) => {
                    orders = snap.docs.map(d => d.data()).sort((a,b) => b.id.localeCompare(a.id));
                    refreshUI();
                }, e => console.error(e));

                if (unsubCart) unsubCart();
                unsubCart = onSnapshot(dbRefs.cart, (snap) => {
                    cart = snap.docs.map(d => d.data());
                    updateCartUI();
                    if (!document.getElementById('buyerView').classList.contains('hidden') && ['cart','checkout'].includes(currentBuyerPage)) {
                        window.navigateTo(currentBuyerPage);
                    }
                }, e => console.error(e));
            }
        });

        // Mô phỏng quá trình Xác Thực 
        window.handleAuth = async (action) => {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const remember = document.getElementById('rememberMe').checked;

            if (!email || pass.length < 6) return showToast("Email không hợp lệ hoặc mật khẩu quá ngắn", "border-red-500", true);
            
            showLoading(true);
            try {
                if (!fbUser) throw new Error("Chưa kết nối được máy chủ.");
                
                // Logic Ghi nhớ Đăng nhập
                if (remember) {
                    localStorage.setItem('agri_remember', JSON.stringify({ email, password: pass, role }));
                } else {
                    localStorage.removeItem('agri_remember');
                }

                // Gán vai trò và Email vào profile của UserID mặc định
                const profileData = { email, role };
                await setDoc(doc(dbRefs.profiles, fbUser.uid), profileData);
                
                userProfile = profileData;
                showToast(action === 'register' ? "Đăng ký thành công!" : "Đăng nhập thành công!");
                routeUser();
            } catch (error) {
                console.error(error);
                showToast("Lỗi xác thực: Không thể truy cập dữ liệu.", "border-red-500", true);
            }
            showLoading(false);
        };

        function routeUser() {
            document.getElementById('loginView').classList.add('hidden');
            if (userProfile.role === 'seller') {
                document.getElementById('buyerView').classList.add('hidden');
                document.getElementById('sellerView').classList.remove('hidden');
                document.getElementById('sellerNameDisplay').innerText = userProfile.email.split('@')[0];
                renderSeller();
            } else {
                document.getElementById('sellerView').classList.add('hidden');
                document.getElementById('buyerView').classList.remove('hidden');
                window.navigateTo('home');
            }
        }

        window.logout = async () => {
            // Xóa giao diện và profile local để quay về trang login.
            document.getElementById('sellerView').classList.add('hidden');
            document.getElementById('buyerView').classList.add('hidden');
            document.getElementById('loginView').classList.remove('hidden');
            
            // Xóa password nếu không đánh dấu Remember Me (Hoặc clear toàn bộ tùy chọn bảo mật)
            const remember = document.getElementById('rememberMe').checked;
            if(!remember) {
                 document.getElementById('password').value = '';
            }
            
            userProfile = null;
        };

        window.fillForm = (r, e, p) => {
            document.getElementById('role').value = r;
            document.getElementById('email').value = e;
            document.getElementById('password').value = p;
            document.getElementById('rememberMe').checked = false;
        };

        // --- BUYER LOGIC & RENDER ---

        window.navigateTo = (page, params = null) => {
            currentBuyerPage = page;
            const container = document.getElementById('buyerContent');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            switch(page) {
                case 'home': renderBuyerHome(container); break;
                case 'detail': renderProductDetail(container, params); break;
                case 'cart': renderCart(container); break;
                case 'checkout': renderCheckout(container); break;
                case 'orders': renderMyOrders(container); break;
            }
            updateCartUI();
        };

        window.handleSearch = (q) => { currentSearchQuery = q.toLowerCase(); refreshUI(); };
        window.setCategory = (cat) => { activeCategory = cat; displayLimit = 8; refreshUI(); };
        window.loadMore = () => { displayLimit += 8; refreshUI(); };

        function refreshUI() {
            if (!document.getElementById('sellerView').classList.contains('hidden')) renderSeller();

        }

        function renderBuyerHome(container) {

                    <div class="absolute inset-0 bg-gradient-to-r from-emerald-900/90 to-transparent flex flex-col justify-center px-8 md:px-16 text-white">

                        <h2 class="text-3xl md:text-5xl font-bold mb-4 leading-tight">Nông sản sạch<br>Tận trang trại</h2>
                        <p class="text-emerald-50 max-w-sm text-sm opacity-90 hidden md:block">Mua sắm trực tiếp từ người nông dân, đảm bảo chất lượng và giá cả tốt nhất.</p>
                    </div>
                </div> ` : ''}

                <div class="flex gap-3 overflow-x-auto no-scrollbar mb-8 pb-2">
                    ${cats.map(c => `
                        <button onclick="setCategory('${c}')" class="px-5 py-2.5 rounded-xl font-bold text-sm whitespace-nowrap transition-all ${activeCategory === c ? 'bg-[#0f172a] text-white shadow-md' : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 hover:border-slate-300'}">${c}</button>
                    `).join('')}
                </div>

                <div class="flex justify-between items-end mb-6 border-b border-slate-100 pb-2">
                    <h3 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                        <span class="w-1.5 h-5 bg-emerald-500 rounded-full"></span>
                        ${currentSearchQuery ? `Kết quả cho "${currentSearchQuery}"` : activeCategory}
                    </h3>
                    <p class="text-xs text-slate-400 font-bold">${list.length} sản phẩm</p>
                </div>
                
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6">
                    ${paginatedList.length > 0 ? paginatedList.map(p => `
                        <div class="bg-white rounded-[1.5rem] border border-slate-100 p-3 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all group flex flex-col cursor-pointer" onclick="navigateTo('detail', '${p.id}')">
                            <div class="aspect-square rounded-xl overflow-hidden mb-3 bg-slate-50 relative">
                                <img src="${p.image}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                                <div class="absolute top-2 left-2 bg-white/90 backdrop-blur px-2 py-0.5 rounded-md text-[10px] font-bold text-emerald-700 uppercase">${p.origin}</div>
                                ${p.stock <= 0 ? '<div class="absolute inset-0 bg-white/60 flex items-center justify-center"><span class="bg-red-500 shadow-md text-white px-3 py-1 rounded-full text-xs font-bold">Hết hàng</span></div>' : ''}
                            </div>
                            <div class="flex-grow px-1">
                                <h4 class="font-bold text-slate-800 text-sm md:text-base leading-tight mb-1 group-hover:text-emerald-600 transition-colors line-clamp-2">${p.name}</h4>
                                <p class="text-[10px] text-slate-400 mb-2 truncate">${p.seller}</p>
                            </div>
                            <div class="flex flex-col xl:flex-row xl:items-center justify-between gap-2 mt-2 px-1">
                                <span class="font-bold text-emerald-600 text-base md:text-lg">${p.price.toLocaleString()}đ</span>
                                <button onclick="event.stopPropagation(); navigateTo('detail', '${p.id}')" class="py-2 px-3 bg-slate-900 text-white rounded-lg text-xs font-bold hover:bg-emerald-500 transition-colors whitespace-nowrap">Xem ngay</button>
                            </div>
                        </div>
                    `).join('') : '<div class="col-span-full py-16 text-center bg-white rounded-3xl border border-dashed border-slate-200"><p class="text-slate-400 font-medium">Không tìm thấy sản phẩm nào phù hợp.</p></div>'}
                </div>
                
                ${list.length > displayLimit ? `<div class="mt-10 flex justify-center"><button onclick="loadMore()" class="px-8 py-3 bg-white border border-slate-200 text-slate-600 font-bold rounded-2xl hover:bg-slate-50 transition-colors text-sm shadow-sm">Xem thêm sản phẩm</button></div>` : ''}
            `;
        }

        function renderProductDetail(container, id) {
            const p = products.find(p => p.id === id);
            if(!p) return;
            const isOut = p.stock <= 0;
            container.innerHTML = `
                <button onclick="navigateTo('home')" class="mb-6 flex items-center gap-2 text-sm font-bold text-slate-500 hover:text-slate-800 transition-colors w-fit px-3 py-1.5 rounded-lg hover:bg-slate-100"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg> Trở về trang chủ</button>
                <div class="bg-white rounded-[2rem] p-4 md:p-8 shadow-sm border border-slate-100 grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12 items-start">

                        <img src="${p.image}" class="w-full h-full object-cover absolute inset-0 transition-transform duration-700 hover:scale-105">

                            <button onclick="buyNow('${p.id}')" ${isOut ? 'disabled' : ''} class="flex-1 py-4 bg-[#0f172a] text-white font-bold rounded-xl hover:bg-black transition-all active:scale-95 disabled:opacity-30 disabled:cursor-not-allowed text-sm shadow-lg shadow-slate-900/20">Mua ngay bây giờ</button>
                        </div>
                    </div>
                </div>

        }

        function renderCart(container) {
            if (cart.length === 0) {
                container.innerHTML = `<div class="text-center py-24 bg-white rounded-[2rem] border border-slate-100 shadow-sm"><div class="w-24 h-24 bg-slate-50 text-slate-300 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner"><svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg></div><h2 class="text-2xl font-bold text-slate-800 mb-2">Giỏ hàng của bạn đang trống</h2><p class="text-slate-500 mb-8 text-sm">Hãy khám phá thêm các nông sản tươi ngon tại trang chủ nhé.</p><button onclick="navigateTo('home')" class="bg-[#0f172a] text-white px-8 py-3.5 rounded-xl font-bold text-sm shadow-lg hover:bg-black transition-all">Khám phá ngay</button></div>`;
                return;
            }
            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            const totalItems = cart.reduce((s, i) => s + i.qty, 0);

            container.innerHTML = `
                <div class="flex items-center gap-3 mb-6">
                    <h2 class="text-2xl font-bold text-slate-800">Giỏ hàng</h2>

                </div>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2 space-y-4">
                        ${cart.map(item => `
                            <div class="bg-white p-4 rounded-2xl border border-slate-100 flex items-center gap-4 shadow-sm hover:shadow-md transition-shadow group">
                                <img src="${item.image}" class="w-20 h-20 md:w-24 md:h-24 rounded-xl object-cover border border-slate-50 bg-slate-50">
                                <div class="flex-grow pr-2">
                                    <h4 class="font-bold text-slate-800 text-sm md:text-base mb-1 line-clamp-1">${item.name}</h4>
                                    <p class="text-emerald-600 font-bold text-base">${item.price.toLocaleString()}đ</p>
                                </div>
                                <div class="flex items-center bg-slate-50 rounded-lg p-1 border border-slate-200">
                                    <button onclick="updateQty('${item.id}', -1)" class="w-7 h-7 md:w-8 md:h-8 flex items-center justify-center font-bold text-slate-500 hover:text-black hover:bg-slate-200 rounded transition-colors">-</button>
                                    <span class="w-6 md:w-8 text-center text-sm font-bold">${item.qty}</span>
                                    <button onclick="updateQty('${item.id}', 1)" class="w-7 h-7 md:w-8 md:h-8 flex items-center justify-center font-bold text-slate-500 hover:text-black hover:bg-slate-200 rounded transition-colors">+</button>
                                </div>
                                <button onclick="removeFromCart('${item.id}')" class="p-2.5 text-slate-300 hover:text-red-500 transition-colors rounded-xl hover:bg-red-50" title="Xóa khỏi giỏ"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>

                            <div class="flex justify-between text-slate-500"><p>Phí vận chuyển</p><p class="text-emerald-500 font-bold bg-emerald-50 px-2 rounded">Miễn phí</p></div>
                        </div>

                    </div>
                </div>
            `;
        }

        function renderCheckout(container) {
            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            container.innerHTML = `
                <button onclick="navigateTo('cart')" class="mb-6 flex items-center gap-2 text-sm font-bold text-slate-500 hover:text-slate-800 w-fit px-3 py-1.5 rounded-lg hover:bg-slate-100 transition-colors"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg> Quay lại giỏ hàng</button>
                <div class="max-w-xl mx-auto bg-white p-6 md:p-10 rounded-[2.5rem] shadow-sm border border-slate-100 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-2 bg-emerald-500"></div>
                    <h3 class="text-2xl font-bold text-slate-800 mb-8 text-center">Hoàn tất đơn hàng</h3>
                    
                    <div class="space-y-5 mb-8">

                            <label class="text-[11px] font-bold text-slate-500 block mb-1.5 uppercase tracking-wide">Người nhận</label>
                            <input id="orderName" value="${userProfile?.email || ''}" class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-sm outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all">
                        </div>
                        <div>
                            <label class="text-[11px] font-bold text-slate-500 block mb-1.5 uppercase tracking-wide">Số điện thoại liên hệ *</label>
                            <input id="orderPhone" placeholder="VD: 0901234567" class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm outline-none focus:ring-2 focus:ring-emerald-500 transition-all font-medium">
                        </div>
                        <div>
                            <label class="text-[11px] font-bold text-slate-500 block mb-1.5 uppercase tracking-wide">Địa chỉ giao hàng chi tiết *</label>
                            <textarea id="orderAddress" placeholder="Số nhà, Tên đường, Phường/Xã, Quận/Huyện, Tỉnh/TP..." class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm outline-none focus:ring-2 focus:ring-emerald-500 transition-all h-24 font-medium leading-relaxed"></textarea>

                    </div>
                    
                    <div class="bg-gradient-to-br from-emerald-50 to-emerald-100/50 p-6 rounded-2xl mb-8 border border-emerald-100">

                        <p class="text-[11px] text-emerald-600 font-medium">Bạn đang mua ${cart.reduce((s,i)=>s+i.qty,0)} sản phẩm. Phí ship: Miễn phí.</p>
                    </div>
                    
                    <button onclick="processOrder()" class="w-full btn-primary py-4 text-base shadow-lg shadow-emerald-200/50 !bg-[#10b981] hover:!bg-emerald-600 uppercase tracking-wide">Xác nhận Đặt hàng ngay</button>
                </div>
            `;
        }

        function renderMyOrders(container) {
            const myOrders = orders.filter(o => o.buyerEmail === userProfile?.email);
            container.innerHTML = `
                <div class="flex items-center justify-between mb-8">
                    <h2 class="text-2xl font-bold text-slate-800">Lịch sử giao dịch</h2>
                    <span class="bg-slate-100 text-slate-600 px-3 py-1 rounded-full text-xs font-bold">${myOrders.length} đơn hàng</span>
                </div>
                <div class="space-y-5 max-w-4xl mx-auto">
                    ${myOrders.length ? myOrders.map(o => {
                        let badgeCol = o.status === 'Hoàn tất' ? 'bg-emerald-50 text-emerald-600 border-emerald-200' : o.status === 'Đã hủy' ? 'bg-red-50 text-red-600 border-red-200' : 'bg-orange-50 text-orange-600 border-orange-200';
                        return `
                        <div class="bg-white p-5 rounded-2xl border border-slate-100 flex flex-col md:flex-row md:items-center justify-between gap-5 shadow-sm hover:shadow-md transition-shadow relative overflow-hidden group">
                            <div class="absolute left-0 top-0 bottom-0 w-1 ${o.status === 'Hoàn tất' ? 'bg-emerald-400' : o.status === 'Đã hủy' ? 'bg-red-400' : 'bg-orange-400'}"></div>
                            <div class="flex items-start gap-4 pl-2">
                                <div class="w-12 h-12 bg-slate-50 rounded-xl flex items-center justify-center text-slate-400 font-bold text-xs shrink-0 border border-slate-100 group-hover:bg-slate-100 transition-colors">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                                </div>
                                <div>
                                    <div class="flex items-center gap-2 mb-1">
                                        <h4 class="font-bold text-slate-800 text-sm md:text-base line-clamp-1">${o.product}</h4>
                                        <span class="text-xs font-bold text-slate-500 bg-slate-100 px-2 py-0.5 rounded">x${o.qty}</span>
                                    </div>
                                    <p class="text-xs text-slate-500 mb-1 flex items-center gap-1"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg> ${o.time}</p>
                                    <p class="text-xs text-slate-400 truncate max-w-xs flex items-center gap-1"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg> ${o.address}</p>

                                <p class="font-bold text-emerald-600 text-lg">${o.total.toLocaleString()}đ</p>
                                <span class="px-3 py-1 rounded-md text-[10px] font-bold uppercase border ${badgeCol} mt-1">${o.status}</span>

                        <div class="text-center py-20 bg-white border border-dashed border-slate-200 rounded-[2rem]">

                            <p class="text-slate-500 font-medium mb-4">Bạn chưa thực hiện giao dịch nào.</p>
                            <button onclick="navigateTo('home')" class="text-emerald-600 font-bold hover:underline text-sm">Đi mua sắm ngay</button>
                        </div>
                    `}
                </div>
            `;

        // --- CART & ORDER LOGIC ---
        window.addToCart = async (id) => {
            if (!userProfile) return showToast("Vui lòng đăng nhập để mua hàng", "border-red-500", true);
            const p = products.find(x => x.id === id);
            if(p.stock <= 0) return showToast("Sản phẩm tạm thời hết hàng", "border-red-500", true);

            const item = cart.find(x => x.id === id);
            showLoading(true);
            try {
                const reqQty = item ? item.qty + 1 : 1;
                if(reqQty > p.stock) { showToast(`Chỉ còn lại ${p.stock} sản phẩm trong kho`, "border-orange-500", true); showLoading(false); return; }
                
                if (item) await updateDoc(doc(dbRefs.cart, id), { qty: reqQty });
                else await setDoc(doc(dbRefs.cart, id), { ...p, qty: 1 });
                showToast(`Đã thêm ${p.name} vào giỏ`);
            } catch (e) { console.error(e); showToast("Đã xảy ra lỗi, vui lòng thử lại", "border-red-500", true); }
            showLoading(false);
        };

        window.buyNow = async (id) => { await window.addToCart(id); window.navigateTo('cart'); };

        window.updateQty = async (id, delta) => {
            const item = cart.find(x => x.id === id);
            const p = products.find(x => x.id === id);
            if (!item || !p) return;
            const newQty = item.qty + delta;
            
            if (newQty > p.stock) return showToast(`Kho chỉ còn ${p.stock} sản phẩm`, "border-orange-500", true);
            
            try {
                if (newQty <= 0) await deleteDoc(doc(dbRefs.cart, id));
                else await updateDoc(doc(dbRefs.cart, id), { qty: newQty });
            } catch(e) { console.error(e); }
        };

        window.removeFromCart = async (id) => { try { await deleteDoc(doc(dbRefs.cart, id)); } catch(e){} };

        window.processOrder = async () => {
            const phone = document.getElementById('orderPhone').value.trim();
            const address = document.getElementById('orderAddress').value.trim();
            const name = document.getElementById('orderName').value.trim();

            if (!phone || !address) return showToast("Vui lòng điền đầy đủ SĐT và Địa chỉ", "border-red-500", true);
            if (cart.length === 0) return;

            showLoading(true);
            try {
                for (const item of cart) {
                    const p = products.find(x => x.id === item.id);
                    if(!p || p.stock < item.qty) throw new Error(`Rất tiếc, ${item.name} không đủ số lượng tồn kho.`);
                }

                const timeStr = new Date().toLocaleString('vi-VN');
                
                for (const item of cart) {
                    const p = products.find(x => x.id === item.id);
                    await updateDoc(doc(dbRefs.products, item.id), { stock: p.stock - item.qty });
                    
                    const oid = 'ORD-' + Date.now() + Math.floor(Math.random() * 100);
                    await setDoc(doc(dbRefs.orders, oid), {
                        id: oid, buyerEmail: userProfile.email, buyerName: name, product: item.name,
                        qty: item.qty, total: item.price * item.qty, address, phone, time: timeStr, status: 'Chờ xác nhận', productId: item.id
                    });
                    await deleteDoc(doc(dbRefs.cart, item.id));
                }
                showToast("Đặt hàng thành công! Vui lòng chờ người bán xác nhận.");
                window.navigateTo('orders');
            } catch(e) { 
                console.error(e); 
                showToast(e.message || "Lỗi hệ thống khi đặt hàng", "border-red-500", true); 
            }
            showLoading(false);
        };

        // --- SELLER LOGIC ---
        let editingProductId = null;

        function renderSeller() {
            const rev = orders.filter(o => o.status === 'Hoàn tất').reduce((s, o) => s + o.total, 0);
            document.getElementById('statProducts').innerText = products.length;
            document.getElementById('statNewOrders').innerText = orders.filter(o => o.status === 'Chờ xác nhận').length;
            document.getElementById('statProcessing').innerText = orders.filter(o => ['Đã xác nhận', 'Đang chuẩn bị', 'Đang giao'].includes(o.status)).length;
            document.getElementById('statRevenue').innerText = rev > 1000000 ? (rev/1000000).toFixed(1) + 'M' : rev.toLocaleString();

            document.getElementById('productList').innerHTML = products.map(p => `
                <div class="bg-white p-3 rounded-2xl border border-slate-100 flex items-center justify-between hover:border-emerald-200 transition-colors group shadow-sm">
                    <div class="flex items-center gap-3">
                        <div class="relative">
                            <img src="${p.image}" class="w-14 h-14 rounded-xl object-cover border border-slate-50 bg-slate-50">
                            ${p.stock <= 0 ? '<span class="absolute -top-1 -right-1 flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span></span>' : ''}
                        </div>
                        <div>
                            <p class="font-bold text-sm text-slate-800 line-clamp-1">${p.name}</p>
                            <p class="text-[11px] text-slate-500 mt-0.5">Giá: <span class="font-bold text-emerald-600">${p.price.toLocaleString()}đ</span> | Kho: <span class="font-bold ${p.stock<=0?'text-red-500':'text-slate-700'}">${p.stock}</span></p>
                        </div>
                    </div>
                    <div class="flex gap-1.5 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="editProduct('${p.id}')" title="Sửa" class="p-2 text-blue-500 bg-blue-50 hover:bg-blue-500 hover:text-white rounded-lg transition-colors"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg></button>
                        <button onclick="deleteProduct('${p.id}')" title="Xóa" class="p-2 text-red-500 bg-red-50 hover:bg-red-500 hover:text-white rounded-lg transition-colors"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
                    </div>
                </div>
            `).join('');

            document.getElementById('orderList').innerHTML = orders.map(o => {
                const isDone = o.status === 'Hoàn tất';
                const isCancel = o.status === 'Đã hủy';
                return `
                <div class="bg-white p-4 rounded-2xl border-l-4 ${isDone ? 'border-l-emerald-500' : isCancel ? 'border-l-red-500' : 'border-l-orange-400'} border-y border-r border-slate-100 shadow-sm hover:shadow-md transition-shadow">
                    <div class="flex flex-col md:flex-row justify-between md:items-center gap-3 mb-2">
                        <div>
                            <p class="font-bold text-sm text-slate-800">${o.product} <span class="text-xs text-slate-400 font-normal bg-slate-100 px-1.5 rounded">x${o.qty}</span></p>
                            <div class="mt-1.5 space-y-0.5">
                                <p class="text-[11px] text-slate-600"><span class="text-slate-400">Khách:</span> <b>${o.buyerName}</b> - ${o.phone}</p>
                                <p class="text-[11px] text-slate-500 truncate w-48 md:w-64" title="${o.address}"><span class="text-slate-400">ĐC:</span> ${o.address}</p>
                            </div>
                        </div>
                        <div class="flex flex-row md:flex-col items-center md:items-end justify-between border-t md:border-t-0 border-slate-100 pt-2 md:pt-0 gap-2">
                            <span class="font-bold text-emerald-600 text-sm md:text-base">${o.total.toLocaleString()}đ</span>
                            <select onchange="updateOrderStatus('${o.id}', this.value)" class="text-xs border ${isDone?'border-emerald-200 text-emerald-700 bg-emerald-50' : isCancel?'border-red-200 text-red-700 bg-red-50' : 'border-slate-200 hover:border-slate-300'} rounded-lg px-2 py-1.5 outline-none font-bold cursor-pointer transition-colors shadow-sm">
                                ${['Chờ xác nhận', 'Đã xác nhận', 'Đang chuẩn bị', 'Đang giao', 'Hoàn tất', 'Đã hủy'].map(s => `<option value="${s}" ${o.status === s ? 'selected' : ''}>${s}</option>`).join('')}
                            </select>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        window.saveProduct = async () => {
            const name = document.getElementById('pName').value.trim();
            const price = parseInt(document.getElementById('pPrice').value);
            const stock = parseInt(document.getElementById('pStock').value);
            let imageUrl = document.getElementById('pImageURL').value.trim() || 'https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&q=80&w=400';
            
            if (!name) return showToast("Vui lòng nhập tên sản phẩm!", "border-red-500", true);
            if (isNaN(price) || price < 0) return showToast("Giá bán phải là số >= 0", "border-red-500", true);
            if (isNaN(stock) || stock < 0) return showToast("Tồn kho phải là số >= 0", "border-red-500", true);

            showLoading(true);
            try {
                const payload = {
                    name, price, stock, image: imageUrl,
                    type: document.getElementById('pType').value || 'Khác',
                    origin: document.getElementById('pOriginInput').value || 'Việt Nam',
                    desc: document.getElementById('pDesc').value || '',
                    seller: userProfile?.email?.split('@')[0] || 'Nhà nông'
                };

                if (editingProductId) {
                    await updateDoc(doc(dbRefs.products, editingProductId), payload);
                    showToast("Cập nhật thành công!");
                } else {
                    const newId = 'P' + Date.now();
                    payload.id = newId;
                    await setDoc(doc(dbRefs.products, newId), payload);
                    showToast("Đã thêm sản phẩm lên kệ!");
                }
                cancelEdit();
            } catch(e) { console.error(e); showToast("Lỗi kết nối máy chủ", "border-red-500", true); }
            showLoading(false);
        };

        window.editProduct = (id) => {
            const p = products.find(x => x.id === id);
            if (!p) return;
            editingProductId = id;
            document.getElementById('formTitle').innerHTML = '<span class="w-1.5 h-6 bg-blue-500 rounded-full"></span> Cập nhật sản phẩm';
            const btn = document.getElementById('btnSaveProduct');
            btn.innerText = "Lưu thay đổi";
            btn.className = "w-full btn-primary !bg-blue-500 hover:!bg-blue-600 py-3.5 shadow-lg shadow-blue-200/50 mt-2";
            document.getElementById('btnCancelEdit').classList.remove('hidden');

            document.getElementById('pIdHidden').value = p.id;
            document.getElementById('pName').value = p.name;
            document.getElementById('pType').value = p.type;
            document.getElementById('pPrice').value = p.price;
            document.getElementById('pStock').value = p.stock;
            document.getElementById('pOriginInput').value = p.origin;
            document.getElementById('pDesc').value = p.desc;
            document.getElementById('pImageURL').value = p.image;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.cancelEdit = () => {
            editingProductId = null;
            document.getElementById('formTitle').innerHTML = '<span class="w-1.5 h-6 bg-emerald-500 rounded-full"></span> Thêm sản phẩm mới';
            const btn = document.getElementById('btnSaveProduct');
            btn.innerText = "Thêm sản phẩm";
            btn.className = "w-full btn-primary !bg-[#10b981] hover:!bg-emerald-600 py-3.5 shadow-lg shadow-emerald-200/50 mt-2";
            document.getElementById('btnCancelEdit').classList.add('hidden');

            document.getElementById('pIdHidden').value = ''; document.getElementById('pName').value = '';
            document.getElementById('pType').value = 'Rau xanh'; document.getElementById('pPrice').value = '';
            document.getElementById('pStock').value = ''; document.getElementById('pOriginInput').value = '';
            document.getElementById('pDesc').value = ''; document.getElementById('pImageURL').value = '';
        };

        window.deleteProduct = async (id) => {
            if(confirm("Xác nhận xóa vĩnh viễn sản phẩm này khỏi cửa hàng?")) {
                showLoading(true);
                try { await deleteDoc(doc(dbRefs.products, id)); showToast("Sản phẩm đã được xóa"); } 
                catch(e) { console.error(e); }
                showLoading(false);
            }
        };

        window.updateOrderStatus = async (id, status) => {
            try { await updateDoc(doc(dbRefs.orders, id), { status }); } catch(e) { console.error(e); }
        };

        // --- UTILS ---
        function updateCartUI() {
            const count = cart.reduce((s, i) => s + i.qty, 0);
            const el = document.getElementById('cartCount');
            el.innerText = count;
            if(count > 0) { el.classList.remove('hidden'); el.classList.add('animate-bounce'); setTimeout(()=>el.classList.remove('animate-bounce'), 1000); } 
            else el.classList.add('hidden');
        }

        function showToast(text, border = "border-emerald-500", isError = false) {
            const toast = document.getElementById('toast');
            document.getElementById('toastText').innerText = text;
            const svg = toast.querySelector('svg');
            
            if(isError) {
                toast.className = `fixed bottom-10 right-10 bg-white shadow-2xl rounded-2xl p-4 border-l-4 ${border} transform transition-all translate-y-0 opacity-100 z-50 flex items-center gap-3`;
                svg.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>';
                svg.classList.replace('text-emerald-500', 'text-red-500');
            } else {
                toast.className = `fixed bottom-10 right-10 bg-white shadow-2xl rounded-2xl p-4 border-l-4 border-emerald-500 transform transition-all translate-y-0 opacity-100 z-50 flex items-center gap-3`;
                svg.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>';
                svg.classList.replace('text-red-500', 'text-emerald-500');
            }
            setTimeout(() => { toast.classList.add('translate-y-40', 'opacity-0'); }, 3500);
        }

        function showLoading(show) {
            const el = document.getElementById('loadingOverlay');
            if(show) el.classList.remove('hidden'); else el.classList.add('hidden');
        }
    </script>
</body>
</html>
